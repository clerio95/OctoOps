# Copy to config.toml and fill in. The Stage 3 wizard will generate this for you.

[telegram]
bot_token = "123456:ABC-REPLACE_ME"
admin_chat_id = "123456789"          # chat that receives startup/error notifications

[transport]
# WhatsApp is optional, output-only. Set false for a Telegram-only deployment:
# the bridge sidecar and callback server are then never started.
whatsapp_enabled = true
whatsapp_bridge_path = "./whatsmeow-bridge.exe"
# Self-healing: if WhatsApp ever rejects the bridge as outdated (error 405, after
# a WhatsApp-side deprecation), OctoOps rebuilds it automatically from the
# whatsmeow-bridge/ source and restarts it — no re-pairing needed. This needs the
# Go toolchain (https://go.dev/dl) installed on the machine; without it you get a
# Telegram alert with the manual rebuild steps instead.
whatsapp_bridge_port = 3000
octoops_callback_port = 3001
# Phone numbers (or JIDs) that receive the startup status message when the bridge
# connects. Format: digits only or full JID, e.g. "5511999998888" or
# "5511999998888@s.whatsapp.net". Leave empty for no WhatsApp startup notification.
whatsapp_admin_chat_ids = []             # e.g. ["5511999998888"]
# Optional inbound: let whitelisted WhatsApp numbers message the bot.
# Off by default — WhatsApp stays output-only. When on, a message from an
# allowed number is routed by priority: the user's open conversation, then a
# command whose declared keyword matches the first word (e.g. "vencimentos"),
# then the DEFAULT command below. The command never comes from the message
# itself, so a WhatsApp user can't invoke arbitrary commands.
whatsapp_inbound_enabled = false
whatsapp_allow = []                  # allowed phone numbers, e.g. ["5511999998888"]
                                     # List PHONE NUMBERS here. WhatsApp often
                                     # addresses inbound senders by an opaque @lid
                                     # instead of their number; after pairing OctoOps
                                     # resolves each number to its LID and allows it
                                     # automatically (cached in data/whatsapp_lids.json),
                                     # so the menu works right away. A raw LID also
                                     # works if you ever need to add one by hand.
whatsapp_command = "ask"             # default command for non-keyword messages
whatsapp_role = "operator"           # role inbound WhatsApp users are treated as

[core]
timezone = "America/Sao_Paulo"
allowed_user_ids = ["123456789"]     # Telegram user IDs allowed to use the bot
operator_user_ids = []
admin_user_ids = ["123456789"]
default_role = "viewer"
log_file = "./logs/octoops.log"
log_max_bytes = 10_000_000
# UI/output language for modules (command names + replies). "en" or "pt-BR".
# The setup wizard sets this from its language picker. With "pt-BR" the deadlines
# module registers as /vencimentos; otherwise /deadlines.
language = "en"

[mcp]
# Optional MCP server (a second control plane) — off by default.
enabled = false
host = "127.0.0.1"                    # loopback; a non-loopback host REQUIRES a token
port = 3002
service_role = "viewer"              # MCP clients are treated as this role
allow_command_execution = false      # master gate; commands also need ai_invokable
                                     # NOTE: enabling this REQUIRES a token (fail-closed)
# token = "set-a-bearer-token-to-require-auth"

[modules]
enabled = ["status", "help", "brain", "deadlines"]   # module folder names that are active

# Per-module config sections look like:
# [modules.my_module]
# device_ip = "192.168.1.50"

[modules.brain]
# Embedded AI assistant: /ask <question>, grounded in a folder of context prompts.
# Provider-agnostic via an OpenAI-compatible endpoint — one key reaches OpenRouter,
# Google Gemini, Groq, a local Ollama, and many free-tier models.
# The API key is NOT stored here. Enter it in the wizard (it's written to a
# private .env beside this file, 0600) or set the BRAIN_API_KEY environment
# variable — either keeps the secret out of config.toml and the logs.
provider    = "openai_compat"
base_url    = "https://openrouter.ai/api/v1"
model       = "google/gemini-2.0-flash-exp:free"
prompts_dir = "data/brain/prompts"   # drop .md/.txt context files here (base-dir-relative)
max_tokens  = 1024

[modules.deadlines]
# Interactive deadline tracker. The command is /deadlines (or /vencimentos when
# core.language = "pt-BR"): a menu offers nearest deadlines, all deadlines, or
# adding a new one (asked one field at a time). Works on Telegram and WhatsApp.
file_path    = "data/deadlines.json"  # JSON store for the records (base-dir-relative)
nearest_days = 15                     # window for the "nearest deadlines" option
# Over WhatsApp this module is keyword-routed: with inbound enabled, any
# message starting with "deadlines" or "vencimentos" opens it — no need to make
# it the whatsapp_command (the brain can stay the default).
